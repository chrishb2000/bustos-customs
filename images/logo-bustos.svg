<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="woodGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513"/>
      <stop offset="100%" style="stop-color:#A0522D"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D2691E"/>
      <stop offset="100%" style="stop-color:#CD853F"/>
    </linearGradient>
  </defs>
  
  <!-- Icon - Stylized Cabinet/Woodwork -->
  <g transform="translate(10, 15)">
    <!-- Cabinet frame -->
    <rect x="0" y="0" width="90" height="90" rx="8" fill="url(#woodGradient)" stroke="url(#accentGradient)" stroke-width="2"/>
    <!-- Cabinet doors -->
    <rect x="8" y="8" width="34" height="74" rx="4" fill="rgba(255,255,255,0.1)" stroke="url(#accentGradient)" stroke-width="1.5"/>
    <rect x="48" y="8" width="34" height="74" rx="4" fill="rgba(255,255,255,0.1)" stroke="url(#accentGradient)" stroke-width="1.5"/>
    <!-- Door handles -->
    <circle cx="38" cy="45" r="3" fill="url(#accentGradient)"/>
    <circle cx="52" cy="45" r="3" fill="url(#accentGradient)"/>
    <!-- Wood grain lines -->
    <line x1="15" y1="20" x2="35" y2="20" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <line x1="12" y1="35" x2="38" y2="35" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <line x1="55" y1="25" x2="75" y2="25" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <line x1="52" y1="55" x2="78" y2="55" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  </g>
  
  <!-- Text -->
  <text x="115" y="55" font-family="Georgia, serif" font-size="28" font-weight="700" fill="url(#woodGradient)">BUSTOS</text>
  <text x="115" y="85" font-family="Georgia, serif" font-size="14" fill="url(#accentGradient)" letter-spacing="3">CUSTOM CABINETS</text>
  <text x="115" y="105" font-family="Arial, sans-serif" font-size="11" fill="#666666" letter-spacing="1">&amp; MILLWORK</text>
</svg>
